// Load current data
let teamData = {};
async function loadData() {
  try {
    // Try to load from scores.json to get latest
    const resp = await fetch('index.html');
    const html = await resp.text();
    TEAMS.forEach(t => {
      const re = new RegExp(`\\{id:"${t.id}",name:"[^"]+",cn:"[^"]+",flag:"[^"]+",grp:"[^"]+",seed:"[^"]+",rk:\\d+,att:\\d+,def:\\d+,best:"[^"]*",apps:\\d+,stars:\\[[^\\]]+\\],conf:"[^"]+",recent:"[^"]*",news:"([^"]*)",inj:"([^"]*)"\\}`);
      const m = html.match(re);
      if (m) {
        teamData[t.id] = { news: m[1] || '', inj: m[2] || '' };
      }
    });
  } catch(e) {}
  render();
}
loadData();

function render() {
  const tbody = document.getElementById('tbody');
  const search = (document.getElementById('search').value || '').toLowerCase();
  tbody.innerHTML = TEAMS.filter(t => {
    if (!search) return true;
    return t.cn.includes(search) || t.id.toLowerCase().includes(search) || t.stars.some(s => s.toLowerCase().includes(search));
  }).map(t => {
    const td = teamData[t.id] || { news: '', inj: '' };
    return `<tr>
      <td class="flag">${t.flag}</td>
      <td><b>${t.cn}</b><br><span style="color:#556680;font-size:11px">${t.id} В· ${t.grp}з»„</span></td>
      <td style="color:#f0b90b">${t.grp}з»„</td>
      <td><input type="text" id="inj_${t.id}" value="${td.inj.replace(/"/g,'&quot;')}" placeholder="дјӨз—…/еҒңиөӣ"></td>
      <td><textarea id="news_${t.id}" rows="2" placeholder="ж–°й—»/еҠЁжҖҒ">${td.news}</textarea></td>
      <td style="color:#8899b4;font-size:12px">${t.stars.join(' В· ')}</td>
    </tr>`;
  }).join('');
  document.getElementById('status').textContent = `е…ұ ${TEAMS.length} ж”Ҝзҗғйҳҹ`;
}

function filterTeams() { render(); }

function generateCode() {
  const dataJsLines = [];
  const htmlLines = [];
  TEAMS.forEach(t => {
    const inj = document.getElementById('inj_' + t.id)?.value || '';
    const news = document.getElementById('news_' + t.id)?.value || '';
    teamData[t.id] = { inj, news };

    // data.js format
    dataJsLines.push(`GHA: inj="${inj}" -> {id:"${t.id}",...,inj:"${inj}"}`);

    // Build the full line for search-replace
    htmlLines.push(`${t.id}: news="${news}", inj="${inj}"`);
  });

  document.getElementById('codeOutput').value = htmlLines.join('\n');
  document.getElementById('result').style.display = 'block';
  document.getElementById('savedMsg').textContent = `(${new Date().toLocaleTimeString('zh-CN')})`;
}

function copyCode() {
  generateCode();
  const ta = document.getElementById('codeOutput');
  ta.select();
  document.execCommand('copy');
  alert('е·ІеӨҚеҲ¶пјҒеҺ» data.js е’Ң index.html дёӯжҗңзҙўеҜ№еә”зҗғйҳҹ ID жӣҝжҚў inj/news еӯ—ж®ө');
}
