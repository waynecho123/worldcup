name: Update Scores

on:
  schedule:
    # Every 30 minutes (UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update scores
        run: node update-scores.js --scores
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}

      - name: Commit & push
        run: |
          git config user.name 'wc-bot'
          git config user.email 'bot@worldcup'
          git add scores.json
          git diff --staged --quiet || (git commit -m "⚽ scores $(TZ='Asia/Shanghai' date +%m-%d_%H:%M)" && git push)
