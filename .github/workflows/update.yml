name: Update Scores

on:
  push:
    branches: [main]
  schedule:
    # Every 30 minutes (UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update scores + news + details
        run: node update-scores.js --scores || true; node update-scores.js --news || true; node update-scores.js --details || true; node update-scores.js --injuries || true; node update-scores.js --standings || true; node update-scores.js --players || true
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}

      - name: Commit & push
        run: |
          git config user.name 'wc-bot'
          git config user.email 'bot@worldcup'
          git add scores.json news.json players.json match-details.json standings.json injuries.json
          git diff --staged --quiet || (git commit -m "⚽ scores $(TZ='Asia/Shanghai' date +%m-%d_%H:%M)" && git push)
