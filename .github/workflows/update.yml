name: Update WC Data

on:
  schedule:
    # 比分：赛后1h拉取 (UTC = BJT-8)
    # BJT 03:30 → UTC 19:30 (00:00/01:00场次)
    # BJT 06:30 → UTC 22:30 (03:00/04:00场次)
    # BJT 09:30 → UTC 01:30 (06:00/07:00场次)
    # BJT 12:30 → UTC 04:30 (09:00/10:00场次)
    # BJT 15:30 → UTC 07:30 (12:00场次)
    - cron: '30 19,22,1,4,7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update scores
        run: node update-scores.js --scores
        env:
          FIRO_API_KEY: ${{ secrets.FIRO_API_KEY }}
          FIRO_PRIVATE_KEY: ${{ secrets.FIRO_PRIVATE_KEY }}

      - name: Commit & push to GitHub
        run: |
          git config user.name 'wc-bot'
          git config user.email 'bot@worldcup'
          git add scores.json
          git diff --staged --quiet || (git commit -m "⚽ scores $(TZ='Asia/Shanghai' date +%m-%d_%H:%M)" && git push)

      - name: Push to Gitee
        run: |
          git push https://waynecho:${{ secrets.GITEE_TOKEN }}@gitee.com/waynecho/worldcup.git main:master --force
